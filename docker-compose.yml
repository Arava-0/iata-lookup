services:

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      PORT: "${API_PORT}"
      NODE_ENV: production
    volumes:
      - iata-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: src/web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    environment:
      WEB_PORT: "${WEB_PORT}"
    restart: unless-stopped

volumes:
  iata-data:
